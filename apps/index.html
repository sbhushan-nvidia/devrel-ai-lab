<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevRel AI Lab — App Directory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1A1A1A;
      color: #E0E0E0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      color: #76B900;
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      max-width: 1000px;
      width: 100%;
    }
    .card {
      background: #2A2A2A;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #333;
      transition: border-color 0.2s, transform 0.2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover {
      border-color: #76B900;
      transform: translateY(-2px);
    }
    .card h3 { color: #76B900; margin-bottom: 8px; }
    .card p { color: #999; font-size: 0.9rem; }
    .badge {
      display: inline-block;
      background: #76B900;
      color: #1A1A1A;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 12px;
    }
    .empty {
      text-align: center;
      color: #666;
      padding: 60px 20px;
      max-width: 500px;
    }
    .empty h2 { color: #76B900; margin-bottom: 16px; }
    .nvidia-logo { font-size: 0.85rem; color: #555; margin-top: 40px; }
  </style>
</head>
<body>
  <h1>🚀 DevRel AI Lab</h1>
  <p class="subtitle">Event Engagement Trackers — built by the team, powered by AI</p>

  <div class="empty">
    <h2>Apps coming soon!</h2>
    <p>During the lab session, each team member will build their own Event Engagement Tracker by talking to an AI bot. Their apps will appear here.</p>
  </div>

  <!-- After the lab, this will be replaced with cards linking to each participant's app -->

  <div class="grid">
    <a href="./shashi/" class="card">
      <h3>Shashi's Event Tracker</h3>
      <p>Conferences, workshops, and developer meetups</p>
      <span class="badge">LIVE</span>
    </a>
  </div>
  -->

  <p class="nvidia-logo">NVIDIA Developer Relations</p>
</body>
</html>
